    function classifyEntry(rawValue) {
      const raw = String(rawValue || 'NOT STATED').replace(/\s+/g, ' ').trim();
      const upper = raw.toUpperCase();
      let type = 'unknown';

      if (upper.includes('HOME COUNTRY')) type = 'home';
      else if (upper.includes('VISA-FREE') || upper.includes('VISA FREE')) type = 'visa-free';
      else if (upper.includes('VISA ON ARRIVAL')) type = 'visa-on-arrival';
      else if (upper.includes('EVISITOR') || /\bETA\b/.test(upper)) type = 'eta';
      else if (/ARRIVAL CARD|PRE-ENROLLMENT|E-TICKET|TOURIST (?:CARD|REGISTRATION)/.test(upper)) type = 'registration';
      else if (upper.includes('EVISA') || upper.includes('E-VISA')) type = 'evisa';
      else if (upper.includes('VISA REQUIRED')) type = 'visa-required';
      else if (upper.includes('NOT ADMITTED')) type = 'not-admitted';

      const dayMatch = upper.match(/(?:^|\s)(\d{1,3})(?:\s|$)/);
      return { raw, type, days: dayMatch ? Number(dayMatch[1]) : null };
    }

    function compareEntries(a, b) {
      const aRank = TYPE_RANK[a.type] ?? TYPE_RANK.unknown;
      const bRank = TYPE_RANK[b.type] ?? TYPE_RANK.unknown;
      if (aRank !== bRank) return aRank < bRank ? 1 : -1;

      if (a.days != null && b.days != null && a.days !== b.days) {
        return a.days > b.days ? 1 : -1;
      }

      return 0;
    }

    function rowOutcome(row) {
      const codes = PASSPORTS.map((passport) => passport.code);
      let bestCode = codes[0];

      for (const code of codes.slice(1)) {
        if (compareEntries(row[code], row[bestCode]) > 0) bestCode = code;
      }

      return {
        winners: codes.filter((code) => compareEntries(row[code], row[bestCode]) === 0),
        best: row[bestCode],
      };
    }

    globalThis.PassportDashboard = {
      PASSPORTS,
      DESTINATIONS,
      TYPE_RANK,
      classifyEntry,
      compareEntries,
      rowOutcome,
    };
  })();
